name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Report-only for now. Once existing content is clean, drop
      # continue-on-error to make lint blocking.
      - name: markdownlint
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            #node_modules

  link-check:
    name: Link check (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --exclude-mail --max-concurrency 4 './**/*.md'"
          fail: false

  json-validate:
    name: JSON & schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: All JSON files must parse
        run: |
          set -e
          fail=0
          for f in $(find . -name '*.json' -not -path './node_modules/*'); do
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$f" \
              || { echo "::error file=$f::Invalid JSON"; fail=1; }
          done
          exit $fail
      - name: Compile bundle schemas (JSON Schema draft 2020-12)
        continue-on-error: true
        run: npx --yes ajv-cli@5 compile --spec=draft2020 -s "b*-*/b*.schema.json"
